services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hirebox}:${POSTGRES_PASSWORD:-hirebox}@db:5432/${POSTGRES_DB:-hirebox}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hirebox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hirebox}
      POSTGRES_DB: ${POSTGRES_DB:-hirebox}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hirebox} -d ${POSTGRES_DB:-hirebox}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
